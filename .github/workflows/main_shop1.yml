name: Build and deploy ASP.Net Core app to Azure Web App - shop1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore ./src/Web/Web.csproj

      - name: Build with dotnet
        run: dotnet build ./src/Web/Web.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish ./src/Web/Web.csproj -c Release -o "${{ env.DOTNET_ROOT }}/myapp" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_863690EA3E3844F48810D63DEADBD3DE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D28B11B65294DE2AE925E9F7F51D0F8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_82EE89BFBF05457E9448764F5DA18814 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: shop1
          slot-name: Production
          package: .    
